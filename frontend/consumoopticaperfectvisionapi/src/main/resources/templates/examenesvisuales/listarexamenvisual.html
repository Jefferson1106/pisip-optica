<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/plantilla/plantillaui">

<head>
<meta charset="UTF-8">
<title>Perfect Vision - Examenes Visuales</title>
</head>

<body>

	<div layout:fragment="contenidopaginas">
		<div class="container-fluid">
			<div class="card shadow mb-4">
				<div class="card-header py-3">
					<h5 class="m-0 font-weight-bold text-primary">Perfect Vision - Examenes Visuales</h5>
				</div>
				<div class="card-body">
					<div class="table-responsive">
						<table class="table table-bordered" id="dataTable" width="100%"
							cellspacing="0">
							<thead>
								<tr th:each="indice : listaordenpedidos">
									<th th:text="${indice.idExamen}"></th>
									<th th:text="${indice.idPaciente}"></th>
									<th th:text="${indice.idEstadoPedido}"></th>
									<th th:text="${indice.idFechaRegistro}"></th>
									<th th:text="${indice.idFechaPedido}"></th>
									<th th:text="${indice.idFechaEntrega}"></th>
								</tr>
							</thead>
							<tbody>
								
							</tbody>
						</table>

					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
