<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="container-fluid">
        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h5 class="m-0 font-weight-bold text-primary">Actualizar Datos Orden Pedido</h5>
            </div>
            <div class="card-body">

                <!-- Mensaje de error desde el backend -->
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/ordenespedido/actualizar}" th:object="${ordenpedido}" method="post">

                    <!-- Campo oculto para ID -->
                    <input type="hidden" th:field="*{idPedido}" />

                    <div class="form-group">
                        <label for="idPaciente">Cédula</label>
                        <input type="text" th:field="*{idPaciente}" class="form-control" id="idPaciente" readonly />
                    </div>

                    <div class="form-group">
                        <label for="idExamen">Examen</label>
                        <input type="text" th:field="*{idExamen}" class="form-control" id="idExamen" readonly  />
                    </div>

                    <div class="form-group">
                        <label for="fechaRegistro">Fecha Registro</label>
                        <input type="text" th:field="*{fechaRegistro}" class="form-control" required />
                    </div>

                    <div class="form-group">
                        <label for="fechaPedido">Fecha Pedido</label>
                        <input type="text" th:field="*{fechaPedido}" class="form-control" required />
                    </div>

                    <div class="form-group">
                        <label for="fechaEntrega">Fecha Entrega</label>
                        <input type="text" th:field="*{fechaEntrega}" class="form-control" required />
                    </div>


                    <button type="submit" class="btn btn-primary">Actualizar</button>
                    <a th:href="@{/ordenpedido}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
