<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/plantilla/plantillaui">

<head>
<meta charset="UTF-8">
<title>Perfect Vision - Usuarios</title>
</head>

<body>

	<div layout:fragment="contenidopaginas">
		<div class="container-fluid">
			<div class="card shadow mb-4">
				<div class="card-header py-3 d-flex justify-content-between align-items-center">
					<h5 class="m-0 font-weight-bold text-primary">Perfect Vision - Usuarios</h5>
					<a th:href="@{/usuarios/nuevo}" class="btn btn-success">Nuevo Usuario</a>
				</div>
				<div class="card-body">
					<div class="table-responsive">
						<div th:if="${success}" class="alert alert-success" role="alert">
							<span th:text="${success}"></span>
						</div>
						<div th:if="${error}" class="alert alert-danger" role="alert">
							<span th:text="${error}"></span>
						</div>

						<table class="table table-bordered" id="dataTable" width="100%"
							cellspacing="0">
							<thead>
								<tr>
									<th style="display:none;">ID</th>
									<th>Nombres</th>
									<th>Apellidos</th>
									<th>Tipo Usuario</th>
									<th>Correo</th>
									<th>Estado</th>
									<th>Acciones</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="usuario : ${listausuarios}">
									<td style="display:none;" th:text="${usuario.idUsuario}"></td>
									<td th:text="${usuario.nombres}"></td>
									<td th:text="${usuario.apellidos}"></td>
									<td th:text="${usuario.tipoUsuarioNombre}"></td>
									<td th:text="${usuario.correo}"></td>
									<td th:text="${usuario.estado ? 'Activo' : 'Inactivo'}"></td>
									<td>
										<a th:href="@{/usuarios/editar/{id}(id=${usuario.idUsuario})}" class="btn btn-warning btn-sm">Actualizar</a>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
