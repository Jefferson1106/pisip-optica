<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/plantilla/plantillaui">

<head>
<meta charset="UTF-8">
<title>CatáPerfect Vision - Pacienteslogos</title>
</head>

<body>

	<div layout:fragment="contenidopaginas">
		<div class="container-fluid">
			<div class="card shadow mb-4">
				<div class="card-header py-3">
					<h5 class="m-0 font-weight-bold text-primary">Perfect Vision -
						Pacientes</h5>
				</div>
				<div class="card-body">
					<div class="table-responsive">
						<table class="table table-bordered" id="dataTable" width="100%"
							cellspacing="0">
							<thead>
								<tr>
									<th>ID</th>
									<th>Nombres</th>
									<th>Apellidos</th>
									<th>Cédula</th>
									<th>Correo</th>
									<th>Teléfono</th>
									<th>Activo</th>
									<th>Acciones</th>
								</tr>
							</thead>
							<tbody>

								<tr th:each="paciente : ${listapacientes}">
									<td th:text="${paciente.idPaciente}"></td>
									<td th:text="${paciente.nombres}"></td>
									<td th:text="${paciente.apellidos}"></td>
									<td th:text="${paciente.cedula}"></td>
									<td th:text="${paciente.correo}"></td>
									<td th:text="${paciente.telefono}"></td>
									<td th:text="${paciente.activo}"></td>
									<td><a href="#" class="btn btn-primary" title="Editar"><i
											class="ti-pencil-alt"></i></a> <a href="#" class="btn btn-danger"
										title="Eliminar"><i class="ti-trash"></i></a></td>
								</tr>
							</tbody>

						</table>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
