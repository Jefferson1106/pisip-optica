<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/plantilla/plantillaui">

<head>
<meta charset="UTF-8">
<title>Actualizar Catálogo - Perfect Vision</title>
</head>

<body>
	<div layout:fragment="contenidopaginas">
		<div class="container-fluid">
			<div class="card shadow mb-4">
				<div class="card-header py-3">
					<h5 class="m-0 font-weight-bold text-primary">Actualizar Catálogo</h5>
				</div>
				<div class="card-body">
					<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

					<form th:action="@{/catalogo/actualizar}" th:object="${catalogo}" method="post">
						<input type="hidden" th:field="*{idCatalogo}" />

						<div class="form-group">
							<label for="descripcion">Descripción</label>
							<input type="text" th:field="*{descripcion}" class="form-control" id="descripcion" required />
						</div>

						<div class="form-group form-check">
							<input type="checkbox" th:field="*{estado}" class="form-check-input" id="estado" />
							<label class="form-check-label" for="estado">Activo</label>
						</div>

						<button type="submit" class="btn btn-primary">Actualizar</button>
						<a th:href="@{/catalogo}" class="btn btn-secondary">Cancelar</a>
					</form>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
