<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/plantilla/plantillaui">

<head>
<meta charset="UTF-8">
<title>Perfect Vision - Detalle Catalogo</title>
</head>

<body>

	<div layout:fragment="contenidopaginas">
		<div class="container-fluid">
			<div class="card shadow mb-4">
				<div class="card-header py-3 d-flex justify-content-between align-items-center">
					<h5 class="m-0 font-weight-bold text-primary">Perfect Vision - Detalle Catalogo</h5>
					<a th:href="@{/detalle-catalogo/nuevo}" class="btn btn-success">Nuevo Detalle</a>
				</div>
				<div class="card-body">
					<div class="table-responsive">
						<div th:if="${success}" class="alert alert-success" role="alert">
							<span th:text="${success}"></span>
						</div>
						<div th:if="${error}" class="alert alert-danger" role="alert">
							<span th:text="${error}"></span>
						</div>

						<table class="table table-bordered" id="dataTable" width="100%"
							cellspacing="0">
							<thead>
								<tr>
									<th style="display:none;">ID</th>
									<th>Nombre</th>
									<th>Catálogo</th>
									<th>Identificador</th>
									<th>Estado</th>
									<th>Acciones</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="detalleCatalogo : ${listadetallecatalogos}">
									<td style="display:none;" th:text="${detalleCatalogo.idDetalleCatalogo}"></td>
									<td th:text="${detalleCatalogo.nombre}"></td>
									<td th:text="${detalleCatalogo.catalogoDescripcion}"></td>
									<td th:text="${detalleCatalogo.identificador}"></td>
									<td th:text="${detalleCatalogo.estado ? 'Activo' : 'Inactivo'}"></td>
									<td>
										<a th:href="@{/detalle-catalogo/editar/{id}(id=${detalleCatalogo.idDetalleCatalogo})}" class="btn btn-warning btn-sm">Actualizar</a>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
