<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="/plantilla/plantillaui">

<head>
    <meta charset="UTF-8">
    <title>Perfect Vision - Órdenes de Entrega</title>
</head>

<body>
<div layout:fragment="contenidopaginas">
    <div class="container-fluid">
        <div class="card shadow mb-4">
            <div class="card-header py-3 d-flex justify-content-between align-items-center">
                <h5 class="m-0 font-weight-bold text-primary">Perfect Vision - Órdenes de Entrega</h5>
                <a th:href="@{/ordenes-entrega/nuevo}" class="btn btn-success">Nueva Orden</a>
            </div>
            <div class="card-body">
                <div class="table-responsive">

                    <div th:if="${success}" class="alert alert-success" role="alert">
                        <span th:text="${success}"></span>
                    </div>
                    <div th:if="${error}" class="alert alert-danger" role="alert">
                        <span th:text="${error}"></span>
                    </div>

                    <table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
                        <thead>
                        <tr>
                            <th>ID Entrega</th>
                            <th>Fecha Entrega</th>
                            <th>Recibido</th>
                            <th>Observaciones</th>
                            <th>ID Pedido</th>
                            <th>Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="orden : ${listaOrdenes}">
                            <td th:text="${orden.idEntrega}"></td>
                            <td th:text="${orden.fechaEntrega}"></td>
                            <td th:text="${orden.recibido}"></td>
                            <td th:text="${orden.observaciones}"></td>
                            <td th:text="${orden.idPedido}"></td>
                            <td>
                                <a th:href="@{/ordenes-entrega/editar/{id}(id=${orden.idEntrega})}"
                                   class="btn btn-warning btn-sm">Actualizar</a>
                                <a th:href="@{/ordenes-entrega/eliminar/{id}(id=${orden.idEntrega})}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('¿Está seguro de eliminar la orden?');">Eliminar</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
