<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/plantilla/plantillaui">
<head>
<meta charset="UTF-8">
<title>Perfect Vision - Nueva Orden Pedido</title>
</head>
<body>
	<div layout:fragment="contenidopaginas">
		<div class="container-fluid">
			<div class="card shadow mb-4">
				<div class="card-header py-3">
					<h5 class="m-0 font-weight-bold text-primary">Registrar Nueva Orden de Pedido</h5>
				</div>
				<div class="card-body">
					<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

					<form th:action="@{/ordenespedido/guardar}" th:object="${ordenpedido}"
						method="post">

						<div class="form-group">
							<label for="idPaciente">Paciente</label>
							<select th:field="*{idPaciente}" class="form-control" id="idPaciente" required>
								<option value="">Seleccione...</option>
								<option th:each="paciente : ${listapacientes}"
										th:value="${paciente.idPaciente}"
										th:text="${paciente.nombres + ' ' + paciente.apellidos + ' - ' + paciente.cedula}"></option>
							</select>
						</div>

						<div class="form-group">
							<label for="idExamen">Examen Visual</label>
							<select th:field="*{idExamen}" class="form-control" id="idExamen" required>
								<option value="">Seleccione...</option>
								<option th:each="examen : ${listaexamenesvisuales}"
										th:value="${examen.idExamen}"
										th:text="${'Examen #' + examen.idExamen + ' | ' + examen.pacienteNombre + ' | ' + examen.fechaExamen}"></option>
							</select>
						</div>

						<div class="form-group">
							<label for="idEstadoPedido">Estado Pedido</label>
							<select th:field="*{idEstadoPedido}" class="form-control" id="idEstadoPedido" required>
								<option value="">Seleccione...</option>
								<option th:each="estado : ${listaestadospedido}"
										th:value="${estado.idDetalleCatalogo}"
										th:text="${estado.identificador + ' - ' + estado.nombre}"></option>
							</select>
						</div>

						<div class="form-group">
							<label for="fechaRegistro">Fecha Registro</label> <input type="text"
								th:field="*{fechaRegistro}" class="form-control" readonly />
						</div>

						<div class="form-group">
							<label for="fechaPedido">Fecha Pedido</label> <input type="date"
								th:field="*{fechaPedido}" class="form-control" required />
						</div>

						<div class="form-group">
							<label for="fechaEntrega">Fecha Entrega</label> <input type="date"
								th:field="*{fechaEntrega}" class="form-control" required />
						</div>

						<button type="submit" class="btn btn-success">Guardar</button>
						<a th:href="@{/ordenespedido}" class="btn btn-secondary">Cancelar</a>
					</form>
				</div>
			</div>
		</div>
	</div>
	
</body>
</html>
