<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/plantilla/plantillaui">

<head>
<meta charset="UTF-8">
<title>Actualizar Detalle Catálogo - Perfect Vision</title>
</head>

<body>
	<div layout:fragment="contenidopaginas">
		<div class="container-fluid">
			<div class="card shadow mb-4">
				<div class="card-header py-3">
					<h5 class="m-0 font-weight-bold text-primary">Actualizar Detalle Catálogo</h5>
				</div>
				<div class="card-body">
					<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

					<form th:action="@{/detalle-catalogo/actualizar}" th:object="${detalleCatalogo}" method="post">
						<input type="hidden" th:field="*{idDetalleCatalogo}" />

						<div class="form-group">
							<label for="idCatalogo">Catálogo</label>
							<select th:field="*{idCatalogo}" class="form-control" id="idCatalogo" required>
								<option value="">Seleccione...</option>
								<option th:each="catalogo : ${listacatalogos}"
										th:value="${catalogo.idCatalogo}"
										th:text="${catalogo.idCatalogo + ' - ' + catalogo.descripcion}"></option>
							</select>
						</div>

						<div class="form-group">
							<label for="nombre">Nombre</label>
							<input type="text" th:field="*{nombre}" class="form-control" id="nombre" required />
						</div>

						<div class="form-group">
							<label for="identificador">Identificador</label>
							<input type="text" th:field="*{identificador}" class="form-control" id="identificador" required />
						</div>

						<div class="form-group form-check">
							<input type="checkbox" th:field="*{estado}" class="form-check-input" id="estado" />
							<label class="form-check-label" for="estado">Activo</label>
						</div>

						<button type="submit" class="btn btn-primary">Actualizar</button>
						<a th:href="@{/detalle-catalogo}" class="btn btn-secondary">Cancelar</a>
					</form>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
