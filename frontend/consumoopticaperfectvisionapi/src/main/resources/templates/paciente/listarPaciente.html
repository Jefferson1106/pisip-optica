<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/plantilla/plantillaui">

<head>
<meta charset="UTF-8">
<title>Perfect Vision - Pacientes</title>
</head>

<body>
	<div layout:fragment="contenidopaginas">
		<div class="container-fluid">
			<div class="card shadow mb-4">
				<div
					class="card-header py-3 d-flex justify-content-between align-items-center">
					<h5 class="m-0 font-weight-bold text-primary">Perfect Vision -
						Pacientes</h5>
					<!-- Botón Nuevo Paciente -->
					<a th:href="@{/paciente/nuevo}" class="btn btn-success">Nuevo
						Paciente</a>
				</div>
				<div class="card-body">
					<div class="table-responsive">

						<div th:if="${success}" class="alert alert-success" role="alert">
							<span th:text="${success}"></span>
						</div>

						<table class="table table-bordered" id="dataTable" width="100%"
							cellspacing="0">
							<thead>
								<tr>
									<th>ID</th>
									<th>Nombres</th>
									<th>Apellidos</th>
									<th>Cédula</th>
									<th>Correo</th>
									<th>Teléfono</th>
									<th>Activo</th>
									<th>Acciones</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="paciente : ${listapacientes}">
									<td th:text="${paciente.idPaciente}"></td>
									<td th:text="${paciente.nombres}"></td>
									<td th:text="${paciente.apellidos}"></td>
									<td th:text="${paciente.cedula}"></td>
									<td th:text="${paciente.correo}"></td>
									<td th:text="${paciente.telefono}"></td>
									<td th:text="${paciente.activo}"></td>
									<td><a
										th:href="@{/paciente/editar/{id}(id=${paciente.idPaciente})}"
										class="btn btn-warning btn-sm">Actualizar</a>

									</td>

								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
		a
	</div>
</body>
</html>
