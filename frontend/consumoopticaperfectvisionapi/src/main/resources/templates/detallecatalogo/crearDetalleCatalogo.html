<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="/plantilla/plantillaui">

<head>
    <meta charset="UTF-8">
    <title>Nuevo Detalle Catálogo - Perfect Vision</title>
</head>

<body>

<div layout:fragment="contenidopaginas">

    <div class="container-fluid">

        <div class="card shadow mb-4">

            <div class="card-header py-3">
                <h5 class="m-0 font-weight-bold text-primary">
                    Registrar Nuevo Detalle Catálogo
                </h5>
            </div>

            <div class="card-body">

                <div th:if="${error}"
                     class="alert alert-danger"
                     th:text="${error}">
                </div>

                <form th:action="@{/detalle-catalogo/guardar}"
                      th:object="${detalleCatalogo}"
                      method="post">

                    <!-- Catálogo -->
                    <div class="form-group">
                        <label for="idCatalogo">Catálogo</label>

                        <select th:field="*{idCatalogo}"
                                class="form-control"
                                id="idCatalogo"
                                required>

                            <option value="">Seleccione...</option>

                            <option th:each="catalogo : ${listacatalogos}"
                                    th:value="${catalogo.idCatalogo}"
                                    th:text="${catalogo.descripcion}">
                            </option>

                        </select>

                    </div>

                    <!-- Nombre -->
                    <div class="form-group">

                        <label for="nombre">Nombre</label>

                        <input
                                type="text"
                                th:field="*{nombre}"
                                class="form-control"
                                id="nombre"
                                required
                                minlength="3"
                                maxlength="100"
                                pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ ]+$"
                                title="Solo se permiten letras y espacios">

                    </div>

                    <!-- Identificador -->
                    <div class="form-group">

                        <label for="identificador">Identificador</label>

                        <input
                                type="text"
                                th:field="*{identificador}"
                                class="form-control"
                                id="identificador"
                                required
                                minlength="2"
                                maxlength="20"
                                title="Ingrese un identificador válido">

                    </div>

                    <!-- Estado -->
                    <div class="form-group form-check">

                        <input type="checkbox"
                               th:field="*{estado}"
                               class="form-check-input"
                               id="estado">

                        <label class="form-check-label"
                               for="estado">
                            Activo
                        </label>

                    </div>

                    <button type="submit"
                            class="btn btn-success">
                        Guardar
                    </button>

                    <a th:href="@{/detalle-catalogo}"
                       class="btn btn-secondary">
                        Cancelar
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

<div layout:fragment="scripts">

<script>

    // Permitir únicamente letras y espacios
    document.getElementById("nombre").addEventListener("input", function () {

        this.value = this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúÑñ ]/g, "");

    });

    // Eliminar espacios al inicio del identificador
    document.getElementById("identificador").addEventListener("input", function () {

        this.value = this.value.replace(/^\s+/, "");

    });

</script>

</div>

</body>

</html>
