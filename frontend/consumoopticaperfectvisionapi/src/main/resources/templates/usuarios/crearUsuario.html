<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/plantilla/plantillaui">

<head>
<meta charset="UTF-8">
<title>Nuevo Usuario - Perfect Vision</title>
</head>

<body>
	<div layout:fragment="contenidopaginas">
		<div class="container-fluid">
			<div class="card shadow mb-4">
				<div class="card-header py-3">
					<h5 class="m-0 font-weight-bold text-primary">Registrar Nuevo Usuario Administrador</h5>
				</div>
				<div class="card-body">
					<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

					<form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">
						<div class="form-group">
							<label for="idTipoUsuario">Tipo de Usuario</label>
							<select th:field="*{idTipoUsuario}" class="form-control" id="idTipoUsuario" required>
								<option value="">Seleccione...</option>
								<option th:each="tipo : ${listatipousuario}"
										th:value="${tipo.idDetalleCatalogo}"
										th:text="${tipo.nombre}"></option>
							</select>
						</div>

						<div class="form-group">
							<label for="nombres">Nombres</label>
							<input type="text" th:field="*{nombres}" class="form-control" id="nombres" required />
						</div>

						<div class="form-group">
							<label for="apellidos">Apellidos</label>
							<input type="text" th:field="*{apellidos}" class="form-control" id="apellidos" required />
						</div>

						<div class="form-group">
							<label for="correo">Correo</label>
							<input type="email" th:field="*{correo}" class="form-control" id="correo" required />
						</div>

						<div class="form-group">
							<label for="contrasenia">Contraseña</label>
							<input type="password" th:field="*{contrasenia}" class="form-control" id="contrasenia" required />
						</div>

						<div class="form-group form-check">
							<input type="checkbox" th:field="*{estado}" class="form-check-input" id="estado" />
							<label class="form-check-label" for="estado">Activo</label>
						</div>

						<button type="submit" class="btn btn-success">Guardar</button>
						<a th:href="@{/usuarios}" class="btn btn-secondary">Cancelar</a>
					</form>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
