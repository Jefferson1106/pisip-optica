<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/plantilla/plantillaui">

<head>
	<meta charset="UTF-8">
	<title>Perfect Vision - Ordenes de Pedido</title>
</head>

<body>
	<div layout:fragment="contenidopaginas">
		<div class="container-fluid">
			<div class="card shadow mb-4">
				<div class="card-header py-3 d-flex justify-content-between align-items-center">
					<h5 class="m-0 font-weight-bold text-primary">Perfect Vision - Ordenes de Pedido</h5>
					<a th:href="@{/ordenespedido/nuevo}" class="btn btn-success">Nueva Orden</a>
				</div>
				<div class="card-body">
					<div class="table-responsive">
						<div th:if="${success}" class="alert alert-success" role="alert">
							<span th:text="${success}"></span>
						</div>
						<div th:if="${error}" class="alert alert-danger" role="alert">
							<span th:text="${error}"></span>
						</div>

						<table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
							<thead>
								<tr>
									<th>ID Pedido</th>
									<th>Paciente</th>
									<th>Examen</th>
									<th>Estado Pedido</th>
									<th>Fecha Registro</th>
									<th>Fecha Pedido</th>
									<th>Fecha Entrega</th>
									<th>Acciones</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="pedido : ${listaordenpedidos}">
									<td th:text="${pedido.idPedido}"></td>
									<td th:text="${pedido.pacienteNombre}"></td>
									<td th:text="${pedido.examenDescripcion}"></td>
									<td th:text="${pedido.nombreEstadoPedido}"></td>
									<td th:text="${pedido.fechaRegistro}"></td>
									<td th:text="${pedido.fechaPedido}"></td>
									<td th:text="${pedido.fechaEntrega}"></td>
									<td>
										<a th:href="@{/ordenespedido/editar/{id}(id=${pedido.idPedido})}" class="btn btn-warning btn-sm">Actualizar</a>
										<a th:href="@{/ordenespedido/eliminar/{id}(id=${pedido.idPedido})}"
										   class="btn btn-danger btn-sm"
										   onclick="return confirm('¿Desea eliminar esta orden de pedido?');">Eliminar</a>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
